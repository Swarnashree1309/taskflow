apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: taskflow
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          resources:
            requests: { cpu: "50m", memory: "80Mi" }
            limits: { cpu: "150m", memory: "150Mi" }
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: taskflow }
spec:
  selector: { app: grafana }
  type: NodePort
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30030 }]
