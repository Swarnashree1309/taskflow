apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: prometheus-reader }
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: prometheus-reader-binding }
subjects:
  - kind: ServiceAccount
    name: default
    namespace: taskflow
roleRef: { kind: ClusterRole, name: prometheus-reader, apiGroup: rbac.authorization.k8s.io }
