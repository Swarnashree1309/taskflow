apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: taskflow
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      serviceAccountName: default
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=1h"]
          resources:
            requests: { cpu: "50m", memory: "80Mi" }
            limits: { cpu: "150m", memory: "150Mi" }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          ports: [{ containerPort: 9090 }]
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: taskflow }
spec:
  selector: { app: prometheus }
  type: NodePort
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30090 }]
