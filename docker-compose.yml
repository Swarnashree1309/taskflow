version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://taskflow:taskflow@db:5432/taskflow
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - db

volumes:
  pgdata:
