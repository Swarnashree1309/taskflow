apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-web
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels: { app: taskflow-web }
  template:
    metadata:
      labels: { app: taskflow-web }
    spec:
      containers:
        - name: taskflow-web
          image: swarnashreeds/taskflow:latest
          ports: [{ containerPort: 5000 }]
          envFrom:
            - secretRef: { name: taskflow-secret }
          resources:
            requests: { cpu: "50m", memory: "100Mi" }
            limits:   { cpu: "150m", memory: "200Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-service
  namespace: taskflow
spec:
  selector: { app: taskflow-web }
  type: NodePort
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080
