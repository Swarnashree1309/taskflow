apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: taskflow
type: Opaque
stringData:
  POSTGRES_USER: taskflow
  POSTGRES_PASSWORD: change-this-password
  POSTGRES_DB: taskflow
  DATABASE_URL: postgresql://taskflow:change-this-password@postgres:5432/taskflow
  SECRET_KEY: change-this-flask-secret-key
