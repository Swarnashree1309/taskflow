{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>My Tasks</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal" onclick="openNewTaskModal()">
    <i class="bi bi-plus-circle"></i> New Task
  </button>
</div>

<table class="table table-hover bg-white shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Due Date</th><th></th>
    </tr>
  </thead>
  <tbody id="task-table-body"></tbody>
</table>

<!-- Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-id">
        <div class="mb-2"><label class="form-label">Title</label><input class="form-control" id="task-title"></div>
        <div class="mb-2"><label class="form-label">Description</label><textarea class="form-control" id="task-description"></textarea></div>
        <div class="row">
          <div class="col-4"><label class="form-label">Category</label><input class="form-control" id="task-category" value="General"></div>
          <div class="col-4">
            <label class="form-label">Priority</label>
            <select class="form-select" id="task-priority">
              <option>Low</option><option selected>Medium</option><option>High</option>
            </select>
          </div>
          <div class="col-4">
            <label class="form-label">Status</label>
            <select class="form-select" id="task-status">
              <option>Pending</option><option>In Progress</option><option>Done</option>
            </select>
          </div>
        </div>
        <div class="mb-2 mt-2"><label class="form-label">Due Date</label><input type="date" class="form-control" id="task-due"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
